# Netlify configuration for the xFusion static site.
# This file lives at the root of the deployable site (site/netlify.toml).

[build]
  publish = "."
  # No build command. The site is pre-rendered HTML.
  command = ""

[build.environment]
  # Pin Node version in case Netlify auto-detects and tries to run anything.
  NODE_VERSION = "20"

# ---------------------------------------------------------------------------
# Security headers applied to every response.
# ---------------------------------------------------------------------------
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "SAMEORIGIN"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Permissions-Policy = "geolocation=(), microphone=(), camera=(), payment=()"
    Strict-Transport-Security = "max-age=31536000; includeSubDomains; preload"
    # Allow inline styles and Google Fonts (used by every page); no scripts from
    # external origins by default. Tighten if a CSP analyzer flags issues.
    Content-Security-Policy = "default-src 'self'; img-src 'self' data: https:; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; script-src 'self' 'unsafe-inline' blob: https://unpkg.com https://cdnjs.cloudflare.com https://embed.savvycal.com https://*.googletagmanager.com https://www.googletagmanager.com https://www.googleadservices.com https://googleads.g.doubleclick.net https://bat.bing.com https://www.clarity.ms https://scripts.clarity.ms https://b2bjsstore.s3.us-west-2.amazonaws.com https://ddwl4m2hdecbv.cloudfront.net https://b-code.liadm.com https://rp.liadm.com https://idx.liadm.com https://liadm.com https://ad.doubleclick.net https://ade.googlesyndication.com https://adservice.google.com https://cct.google https://pagead2.googlesyndication.com https://clarity.microsoft.com https://ui.ads.microsoft.com; connect-src 'self' https://savvycal.com https://*.savvycal.com https://services.leadconnectorhq.com https://*.leadconnectorhq.com https://script.google.com https://script.googleusercontent.com https://*.google-analytics.com https://analytics.google.com https://*.analytics.google.com https://*.googletagmanager.com https://www.googleadservices.com https://googleads.g.doubleclick.net https://www.google.com https://bat.bing.com https://stats.g.doubleclick.net https://*.clarity.ms https://c.bing.com https://b2bjsstore.s3.us-west-2.amazonaws.com https://api.rb2b.com https://ddwl4m2hdecbv.cloudfront.net https://pro.ip-api.com https://alocdn.com https://9xgnrndqve.execute-api.us-west-2.amazonaws.com https://a.usbrowserspeed.com https://*.liadm.com https://ad.doubleclick.net https://ade.googlesyndication.com https://adservice.google.com https://cct.google https://pagead2.googlesyndication.com https://clarity.microsoft.com https://ui.ads.microsoft.com; frame-src 'self' https://savvycal.com https://www.googletagmanager.com https://td.doubleclick.net https://ad.doubleclick.net https://cct.google https://pagead2.googlesyndication.com; frame-ancestors 'self'"

# ---------------------------------------------------------------------------
# /faq-embed/* and /case-studies/* — intentionally iframable from anywhere.
# These paths are embedded inside third-party deal-room tools (Aligned and
# similar) inside per-client templates. The rest of the site keeps strict
# no-frame clickjacking protection above; these blocks override
# X-Frame-Options and CSP frame-ancestors for these paths only. Later
# [[headers]] blocks win on conflicting keys per Netlify behavior.
#
# Note: the /case-studies/* override uses the SAME CSP as the global "/*"
# block (so all existing third-party scripts on the case study pages — GTM,
# RB2B, Clarity, Google Ads, Bing — keep working), just with
# frame-ancestors * instead of 'self'. The /faq-embed/* CSP is tighter
# because that page is intentionally minimal.
# ---------------------------------------------------------------------------
[[headers]]
  for = "/faq-embed/*"
  [headers.values]
    X-Frame-Options = "ALLOWALL"
    Content-Security-Policy = "default-src 'self'; img-src 'self' data: https:; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; script-src 'self' 'unsafe-inline' https://*.googletagmanager.com https://www.googletagmanager.com; connect-src 'self' https://*.google-analytics.com https://analytics.google.com https://*.analytics.google.com https://*.googletagmanager.com; frame-src 'self' https://www.googletagmanager.com; frame-ancestors *"

# Stripped-down case study embeds (no nav/footer/sticky-CTA chrome).
# Same tight CSP as /faq-embed/* — these pages are minimal static HTML,
# no React/Babel CDN, no trackers other than GTM. Designed specifically
# for iframing inside deal-room templates (Aligned and similar).
[[headers]]
  for = "/case-studies-embed/*"
  [headers.values]
    X-Frame-Options = "ALLOWALL"
    Content-Security-Policy = "default-src 'self'; img-src 'self' data: https:; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; script-src 'self' 'unsafe-inline' https://*.googletagmanager.com https://www.googletagmanager.com; connect-src 'self' https://*.google-analytics.com https://analytics.google.com https://*.analytics.google.com https://*.googletagmanager.com; frame-src 'self' https://www.googletagmanager.com; frame-ancestors *"

[[headers]]
  for = "/case-studies/*"
  [headers.values]
    X-Frame-Options = "ALLOWALL"
    Content-Security-Policy = "default-src 'self'; img-src 'self' data: https:; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; script-src 'self' 'unsafe-inline' blob: https://unpkg.com https://cdnjs.cloudflare.com https://embed.savvycal.com https://*.googletagmanager.com https://www.googletagmanager.com https://www.googleadservices.com https://googleads.g.doubleclick.net https://bat.bing.com https://www.clarity.ms https://scripts.clarity.ms https://b2bjsstore.s3.us-west-2.amazonaws.com https://ddwl4m2hdecbv.cloudfront.net https://b-code.liadm.com https://rp.liadm.com https://idx.liadm.com https://liadm.com https://ad.doubleclick.net https://ade.googlesyndication.com https://adservice.google.com https://cct.google https://pagead2.googlesyndication.com https://clarity.microsoft.com https://ui.ads.microsoft.com; connect-src 'self' https://savvycal.com https://*.savvycal.com https://services.leadconnectorhq.com https://*.leadconnectorhq.com https://script.google.com https://script.googleusercontent.com https://*.google-analytics.com https://analytics.google.com https://*.analytics.google.com https://*.googletagmanager.com https://www.googleadservices.com https://googleads.g.doubleclick.net https://www.google.com https://bat.bing.com https://stats.g.doubleclick.net https://*.clarity.ms https://c.bing.com https://b2bjsstore.s3.us-west-2.amazonaws.com https://api.rb2b.com https://ddwl4m2hdecbv.cloudfront.net https://pro.ip-api.com https://alocdn.com https://9xgnrndqve.execute-api.us-west-2.amazonaws.com https://a.usbrowserspeed.com https://*.liadm.com https://ad.doubleclick.net https://ade.googlesyndication.com https://adservice.google.com https://cct.google https://pagead2.googlesyndication.com https://clarity.microsoft.com https://ui.ads.microsoft.com; frame-src 'self' https://savvycal.com https://www.googletagmanager.com https://td.doubleclick.net https://ad.doubleclick.net https://cct.google https://pagead2.googlesyndication.com; frame-ancestors *"

# Cache images aggressively; they are hashless but stable in practice.
[[headers]]
  for = "/images/*"
  [headers.values]
    Cache-Control = "public, max-age=604800"   # 7 days

[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=604800"

[[headers]]
  for = "/*.css"
  [headers.values]
    Cache-Control = "public, max-age=86400"    # 1 day

# HTML pages: short cache so updates ship quickly.
[[headers]]
  for = "/*.html"
  [headers.values]
    Cache-Control = "public, max-age=300, must-revalidate"

# ---------------------------------------------------------------------------
# Redirects. Order matters: more-specific patterns must come first.
# ---------------------------------------------------------------------------

# Force apex (xfusion.io) over www for canonical URLs. Also handles legacy
# www links from emails / external sites without losing trailing path or query.
[[redirects]]
  from = "https://www.xfusion.io/*"
  to = "https://xfusion.io/:splat"
  status = 301
  force = true

# Consolidate WordPress slug-collision duplicates ("-2" variants) to their
# canonical non-`-2` URLs. Google Search Console flagged these as
# "Duplicate, Google chose different canonical than user" on 2026-05-12.
# The non-`-2` versions are the longer, higher-quality content per the WP
# migration audit; Jim approved permanent consolidation on 2026-05-14.
[[redirects]]
  from = "/customer-experience/seamless-support-how-to-integrate-customer-service-across-every-channel-2/"
  to = "/customer-experience/seamless-support-how-to-integrate-customer-service-across-every-channel/"
  status = 301
  force = true
[[redirects]]
  from = "/customer-support/how-outsourced-customer-support-frees-you-to-focus-on-what-matters-most-2/"
  to = "/customer-support/how-outsourced-customer-support-frees-you-to-focus-on-what-matters-most/"
  status = 301
  force = true

# Block legacy WordPress admin/auth/RPC paths so attackers don't even get a 404.
[[redirects]]
  from = "/wp-admin/*"
  to = "/404.html"
  status = 404
[[redirects]]
  from = "/wp-login.php"
  to = "/404.html"
  status = 404
[[redirects]]
  from = "/xmlrpc.php"
  to = "/404.html"
  status = 404
[[redirects]]
  from = "/wp-json/*"
  to = "/404.html"
  status = 404
[[redirects]]
  from = "/wp-content/*"
  to = "/404.html"
  status = 404
[[redirects]]
  from = "/wp-includes/*"
  to = "/404.html"
  status = 404

# Old WordPress feed URLs -> blog index.
[[redirects]]
  from = "/feed/*"
  to = "/blog/"
  status = 301
[[redirects]]
  from = "/comments/feed/*"
  to = "/blog/"
  status = 301

# Old paginated WordPress category archives -> the category index page.
[[redirects]]
  from = "/category/customer-experience/page/:n"
  to = "/customer-experience/"
  status = 301
[[redirects]]
  from = "/category/customer-experience/*"
  to = "/customer-experience/"
  status = 301
[[redirects]]
  from = "/category/customer-support/page/:n"
  to = "/customer-support/"
  status = 301
[[redirects]]
  from = "/category/customer-support/*"
  to = "/customer-support/"
  status = 301
[[redirects]]
  from = "/category/saas-metrics/page/:n"
  to = "/saas-metrics/"
  status = 301
[[redirects]]
  from = "/category/saas-metrics/*"
  to = "/saas-metrics/"
  status = 301
[[redirects]]
  from = "/category/work-culture/*"
  to = "/customer-experience/"
  status = 301
[[redirects]]
  from = "/category/case-studies/*"
  to = "/case-studies/"
  status = 301
[[redirects]]
  from = "/category/*"
  to = "/blog/"
  status = 301

# Old WordPress tag archives -> blog. We have no tag pages on the new site.
[[redirects]]
  from = "/tag/*"
  to = "/blog/"
  status = 301

# Author archive pages (rare but possible) -> blog.
[[redirects]]
  from = "/author/*"
  to = "/blog/"
  status = 301

# Old root-level pages that no longer exist.
[[redirects]]
  from = "/saas-playbook"
  to = "/blog/"
  status = 301
[[redirects]]
  from = "/customer-support-playbook"
  to = "/blog/"
  status = 301
[[redirects]]
  from = "/faqs"
  to = "/faq/"
  status = 301

# Date-based archives (some WP themes expose /YYYY/MM/...).
[[redirects]]
  from = "/2023/*"
  to = "/blog/"
  status = 301
[[redirects]]
  from = "/2024/*"
  to = "/blog/"
  status = 301
[[redirects]]
  from = "/2025/*"
  to = "/blog/"
  status = 301

# Catch-all 404 (Netlify uses 404.html automatically; this is explicit).
[[redirects]]
  from = "/*"
  to = "/404.html"
  status = 404

# Prerender source snapshots: served if requested directly, but never indexed.
[[headers]]
  for = "/*.src.html"
  [headers.values]
    X-Robots-Tag = "noindex"
