<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Security at xFusion | xFusion</title>
  <meta name="description" content="We take customer data seriously. Our agents are trained on secure handling, our infrastructure follows industry standards, and DPAs are available on request.">
  <link rel="stylesheet" href="../colors_and_type.css">
  <style>
    body { background: #F7F2EB; }
    a { transition: color 160ms cubic-bezier(0.4,0,0.6,1); }
    a:hover { color: #A0451F; }
    button:focus-visible, a:focus-visible { outline: 2px solid #B8512C; outline-offset: 3px; border-radius: 6px; }
  </style>
  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" crossorigin="anonymous"></script>
</head>
<body>
  <div id="root"></div>
  <script type="text/babel">
    const { useState, useEffect } = React;

    function Container({ children, narrow = false, style = {} }) { return <div style={{ maxWidth: narrow ? 760 : 1200, margin: '0 auto', padding: '0 24px', ...style }}>{children}</div>; }
    function Section({ children, bg = 'paper', padding = 'lg', id, style = {} }) {
      const bgs = { paper: '#F7F2EB', 'paper-2': '#EFE8DD', butter: '#F8EBC9', 'butter-strong': '#F0D9A8', forest: '#2C4A3E' };
      const pads = { sm: '56px 0', md: '80px 0', lg: '112px 0' };
      return <section id={id} style={{ background: bgs[bg], padding: pads[padding], ...style }}>{children}</section>;
    }
    function Eyebrow({ children, color = '#6B5F56' }) {
      return <div style={{ fontFamily: "'IBM Plex Sans', sans-serif", fontSize: 12, fontWeight: 600, textTransform: 'uppercase', letterSpacing: '0.14em', color, marginBottom: 18 }}>{children}</div>;
    }
    function Button({ children, variant = 'primary', size = 'md', href, style = {} }) {
      const [hover, setHover] = useState(false);
      const [pressed, setPressed] = useState(false);
      const sizes = { sm: { padding: '8px 14px', fontSize: 13 }, md: { padding: '12px 22px', fontSize: 15 }, lg: { padding: '16px 28px', fontSize: 16 } };
      let bg, color, border;
      if (variant === 'primary') { bg = pressed ? '#863818' : hover ? '#A0451F' : '#B8512C'; color = '#F7F2EB'; border = '1px solid transparent'; }
      else { bg = hover ? '#EFE8DD' : 'transparent'; color = '#1F1A17'; border = '1px solid #B7A993'; }
      const Tag = href ? 'a' : 'button';
      return <Tag href={href} onMouseEnter={() => setHover(true)} onMouseLeave={() => { setHover(false); setPressed(false); }} onMouseDown={() => setPressed(true)} onMouseUp={() => setPressed(false)} style={{ background: bg, color, border, borderRadius: 8, fontFamily: "'IBM Plex Sans', sans-serif", fontWeight: 500, cursor: 'pointer', lineHeight: 1.1, textDecoration: 'none', display: 'inline-flex', alignItems: 'center', gap: 8, transition: 'all 160ms cubic-bezier(0.4,0,0.6,1)', whiteSpace: 'nowrap', ...sizes[size], ...style }}>{children}</Tag>;
    }
    const Icons = {
      menu: <g><path d="M3 12h18"/><path d="M3 6h18"/><path d="M3 18h18"/></g>,
      x: <g><path d="M18 6L6 18"/><path d="M6 6l12 12"/></g>,
      check: <path d="M20 6L9 17l-5-5"/>,
      linkedin: <g><path d="M16 8a6 6 0 0 1 6 6v7h-4v-7a2 2 0 0 0-4 0v7h-4v-7a6 6 0 0 1 6-6z"/><rect x="2" y="9" width="4" height="12"/><circle cx="4" cy="4" r="2"/></g>,
      twitter: <path d="M22 4s-.7 2.1-2 3.4c1.6 10-9.4 17.3-18 11.6 2.2.1 4.4-.6 6-2-3 0-6-2.5-6-5.5 1 .5 2 .5 3 0-3-1-5-4-5-7 1 .5 2 1 3 1-3-2-3-7 0-9 4 5 10 7.5 16 7-.7-3 1.2-6 4-6 1.5 0 3 .8 4 2 1-.2 2-.5 3-1z"/>,
      instagram: <g><rect x="2" y="2" width="20" height="20" rx="5"/><circle cx="12" cy="12" r="4"/></g>,
      facebook: <path d="M18 2h-3a5 5 0 0 0-5 5v3H7v4h3v8h4v-8h3l1-4h-4V7a1 1 0 0 1 1-1h3z"/>,
      youtube: <g><path d="M22.5 6.5a2.8 2.8 0 0 0-2-2C18.7 4 12 4 12 4s-6.7 0-8.5.5a2.8 2.8 0 0 0-2 2C1 8.3 1 12 1 12s0 3.7.5 5.5a2.8 2.8 0 0 0 2 2C5.3 20 12 20 12 20s6.7 0 8.5-.5a2.8 2.8 0 0 0 2-2c.5-1.8.5-5.5.5-5.5s0-3.7-.5-5.5z"/><path d="M10 15l5-3-5-3z" fill="currentColor"/></g>,
    };
    function Icon({ name, size = 20 }) { return <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.6" strokeLinecap="round" strokeLinejoin="round" style={{ flexShrink: 0, display: 'inline-block' }}>{Icons[name]}</svg>; }

    function Nav({ current }) {
      const [scrolled, setScrolled] = useState(false);
      const [open, setOpen] = useState(false);
      useEffect(() => { const onScroll = () => setScrolled(window.scrollY > 8); window.addEventListener('scroll', onScroll); return () => window.removeEventListener('scroll', onScroll); }, []);
      const linkStyle = (active) => ({ color: active ? '#B8512C' : '#1F1A17', textDecoration: 'none', fontFamily: "'IBM Plex Sans', sans-serif", fontWeight: active ? 500 : 400, fontSize: 14, whiteSpace: 'nowrap' });
      const links = [{ label: 'Home', href: '../', key: 'home' }, { label: 'About', href: '../about/', key: 'about' }, { label: 'Case studies', href: '../case-studies/', key: 'case-studies' }, { label: 'Careers', href: '../careers/', key: 'careers' }, { label: 'Blog', href: 'https://blog.xfusion.io', key: 'blog' }];
      return (
        <nav style={{ position: 'sticky', top: 0, zIndex: 50, background: scrolled ? 'rgba(247, 242, 235, 0.88)' : 'transparent', backdropFilter: scrolled ? 'blur(12px)' : 'none', WebkitBackdropFilter: scrolled ? 'blur(12px)' : 'none', borderBottom: scrolled ? '1px solid #D9CFBF' : '1px solid transparent', transition: 'all 240ms cubic-bezier(0.4,0,0.6,1)' }}>
          <Container>
            <div style={{ height: 72, display: 'flex', alignItems: 'center', gap: 32 }}>
              <a href="../" style={{ display: 'flex', alignItems: 'baseline', textDecoration: 'none' }} aria-label="xFusion home"><img src="../assets/xfusion-logo.png" alt="xFusion" style={{ height: 36, width: "auto", display: "block" }} /></a>
              <div className="nav-links" style={{ display: 'flex', gap: 28, marginLeft: 24 }}>{links.map(l => <a key={l.key} href={l.href} style={linkStyle(current === l.key)}>{l.label}</a>)}</div>
              <div style={{ marginLeft: 'auto', display: 'flex', gap: 12, alignItems: 'center' }}>
                <Button variant="primary" size="sm" href="https://savvycal.com/xfusion/lets-chat">Book a Discovery Call</Button>
                <button className="nav-mobile-toggle" onClick={() => setOpen(!open)} style={{ display: 'none', background: 'transparent', border: '1px solid #B7A993', borderRadius: 8, padding: 8, cursor: 'pointer', color: '#1F1A17' }} aria-label="Toggle menu"><Icon name={open ? 'x' : 'menu'} size={20} /></button>
              </div>
            </div>
            {open && (<div className="nav-mobile-menu" style={{ display: 'none', flexDirection: 'column', gap: 16, padding: '8px 0 24px', borderTop: '1px solid #D9CFBF' }}>{links.map(l => <a key={l.key} href={l.href} style={linkStyle(current === l.key)} onClick={() => setOpen(false)}>{l.label}</a>)}</div>)}
          </Container>
          <style>{`@media (max-width: 800px) { .nav-links { display: none !important; } .nav-mobile-toggle { display: inline-flex !important; } .nav-mobile-menu { display: flex !important; } }`}</style>
        </nav>
      );
    }

    function Footer() {
      const cols = [
        { title: 'Product',  links: [
          ['Pricing',       '../#pricing'],
          ['Case studies',  '../case-studies/'],
        ]},
        { title: 'Company',  links: [
          ['About',    '../about/'],
          ['Careers',  '../careers/'],
          ['Contact', '../contact/'],
        ]},
        { title: 'Resources', links: [
          ['FAQ',           '../#faq'],
          ['Blog',          '../blog/'],
        ]},
        { title: 'Legal',    links: [
          ['Privacy',   '../privacy/'],
          ['DPA',       '../dpa/'],
          ['Security',  '../security/'],
        ]},
      ];
      const FOREST  = '#2C4A3E';
      const PAPER   = '#F7F2EB';
      const BUTTER  = '#F0D9A8';
      const DIVIDER = 'rgba(247, 242, 235, 0.14)';
      const MUTED   = 'rgba(247, 242, 235, 0.65)';
      return (
        <footer style={{ background: FOREST, color: PAPER }}>
          <Container>
            <div className="footer-top" style={{ display: 'grid', gridTemplateColumns: '1.4fr 1fr', gap: 32, alignItems: 'center', paddingTop: 64, paddingBottom: 40, borderBottom: `1px solid ${DIVIDER}` }}>
              <div>
                <a href="../" style={{ display: 'inline-flex', alignItems: 'center', gap: 10, marginBottom: 14, textDecoration: 'none' }}>
                  <img src="../assets/xfusion-logo-on-dark.png" alt="xFusion" style={{ height: 36, width: "auto", display: "block" }} />
                  
                </a>
                <p style={{ fontFamily: "'Source Serif 4', serif", fontSize: 18, lineHeight: 1.5, color: BUTTER, margin: 0, maxWidth: 480, fontStyle: 'italic', fontWeight: 400 }}>
                  Senior, AI-trained customer support agents for small businesses. Since 2020.
                </p>
              </div>
              
            </div>
            <div className="footer-grid" style={{ display: 'grid', gridTemplateColumns: 'repeat(4, 1fr)', gap: 40, paddingTop: 48, paddingBottom: 40 }}>
              {cols.map(col => (
                <div key={col.title}>
                  <div style={{ fontFamily: "'JetBrains Mono', monospace", fontSize: 11, fontWeight: 500, textTransform: 'uppercase', letterSpacing: '0.14em', color: MUTED, marginBottom: 18 }}>{col.title}</div>
                  <ul style={{ listStyle: 'none', margin: 0, padding: 0, display: 'flex', flexDirection: 'column', gap: 10 }}>
                    {col.links.map(([label, href]) => (
                      <li key={label}>
                        <a href={href} className="footer-link" style={{ color: PAPER, textDecoration: 'none', fontFamily: "'IBM Plex Sans', sans-serif", fontSize: 15, lineHeight: 1.4 }}>{label}</a>
                      </li>
                    ))}
                  </ul>
                </div>
              ))}
            </div>
            <div className="footer-legal" style={{ paddingTop: 24, paddingBottom: 32, borderTop: `1px solid ${DIVIDER}`, display: 'flex', justifyContent: 'space-between', alignItems: 'center', fontFamily: "'IBM Plex Sans', sans-serif", fontSize: 13, color: MUTED, flexWrap: 'wrap', gap: 12 }}>
              <div>© 2026 xFusion. All rights reserved.</div>
              <div>Made with care across the Philippines, Kenya, and the United States.</div>
            </div>
          </Container>
          <style>{`
            .footer-link:hover { color: ${BUTTER}; }
            @media (max-width: 900px) {
              .footer-top { grid-template-columns: 1fr !important; gap: 20px !important; }
              .footer-cta { justify-content: flex-start !important; }
              .footer-grid { grid-template-columns: 1fr 1fr !important; gap: 32px !important; }
              .footer-legal { flex-direction: column; align-items: flex-start !important; }
            }
            @media (max-width: 520px) { .footer-grid { grid-template-columns: 1fr !important; gap: 28px !important; } }
          `}</style>
        </footer>
      );
    }

    function App() {
      const sectionH2 = { fontFamily: "'Source Serif 4', serif", fontSize: 'clamp(28px, 3.2vw, 42px)', fontWeight: 400, lineHeight: 1.15, letterSpacing: '-0.02em', margin: '0 0 24px', color: '#1F1A17' };
      const subH3 = { fontFamily: "'Source Serif 4', serif", fontSize: 22, fontWeight: 600, lineHeight: 1.3, color: '#1F1A17', margin: '24px 0 10px' };
      const body = { fontFamily: "'IBM Plex Sans', sans-serif", fontSize: 17, lineHeight: 1.65, color: '#3A322D', margin: '0 0 16px' };
      const bullet = { display: 'flex', alignItems: 'flex-start', gap: 14, fontFamily: "'IBM Plex Sans', sans-serif", fontSize: 16, lineHeight: 1.55, color: '#1F1A17' };
      const checkBadge = { width: 22, height: 22, borderRadius: 999, background: '#B8512C', color: '#F7F2EB', display: 'flex', alignItems: 'center', justifyContent: 'center', flexShrink: 0, marginTop: 3 };

      return (
        <div data-screen-label="Security">
          <Nav current="security" />
          <main>
            <Section bg="paper" padding="lg" style={{ paddingTop: 96, paddingBottom: 64 }}>
              <Container narrow>
                <Eyebrow>Trust and security</Eyebrow>
                <h1 style={{ fontFamily: "'Source Serif 4', serif", fontSize: 'clamp(40px, 5.6vw, 76px)', fontWeight: 400, lineHeight: 1.05, letterSpacing: '-0.025em', margin: '0 0 28px', color: '#1F1A17', textWrap: 'balance' }}>
                  Security at xFusion.
                </h1>
                <p style={{ fontFamily: "'Source Serif 4', serif", fontSize: 'clamp(20px, 2.1vw, 26px)', lineHeight: 1.45, color: '#3A322D', fontWeight: 400, margin: '0 0 24px', maxWidth: 760, textWrap: 'pretty' }}>
                  When you bring xFusion into your business, you are giving us access to customer conversations, helpdesk data, and internal tools. We treat that access like the responsibility it is. Here is how.
                </p>
                <div style={{ fontFamily: "'JetBrains Mono', monospace", fontSize: 12, textTransform: 'uppercase', letterSpacing: '0.14em', color: '#6B5F56' }}>
                  Last updated: April 29, 2026
                </div>
              </Container>
            </Section>

            <Section bg="paper-2" padding="lg" style={{ paddingTop: 64, paddingBottom: 64 }}>
              <Container narrow>
                <Eyebrow>The shape of the problem</Eyebrow>
                <h2 style={sectionH2}>What our security model actually has to protect.</h2>
                <p style={body}>
                  We are a managed customer support service. Most of the data we touch lives in tools our clients already own (Help Scout, Intercom, Zendesk, Gorgias, Front, HubSpot, Shopify, etc.). We work inside those tools as authorized users with role-based permissions. That structure is intentional, because it means data stays where the client already has security and audit controls in place.
                </p>
                <p style={body}>
                  The places where xFusion holds data directly are narrower: payroll for our placed team, internal documentation about each client's workflows, our recruiting pipeline, and the operational tooling we use to run the business. Each layer below describes how we protect those.
                </p>
              </Container>
            </Section>

            <Section bg="paper" padding="lg" style={{ paddingTop: 64, paddingBottom: 64 }}>
              <Container narrow>
                <Eyebrow>People</Eyebrow>
                <h2 style={sectionH2}>Who has access, and how we keep it that way.</h2>

                <h3 style={subH3}>Hiring and vetting</h3>
                <p style={body}>
                  Every team member goes through the TraitX framework before placement. That includes background screening appropriate to the role and jurisdiction, identity verification, reference checks, and a structured assessment of judgment and discretion under pressure. Less than one percent of applicants make it through.
                </p>

                <h3 style={subH3}>Confidentiality and training</h3>
                <ul style={{ listStyle: 'none', padding: 0, margin: '0 0 16px', display: 'flex', flexDirection: 'column', gap: 12 }}>
                  {[
                    'Every team member signs a confidentiality and IP agreement before they receive any client access.',
                    'Onboarding includes security training: phishing recognition, credential hygiene, customer data handling, and reporting suspicious activity.',
                    'Refresher training runs at least annually and after any incident or material policy change.',
                    'Account managers reinforce security expectations during weekly one-on-ones with placed team members.',
                  ].map(b => (
                    <li key={b} style={bullet}>
                      <span style={checkBadge}><Icon name="check" size={12} /></span>
                      {b}
                    </li>
                  ))}
                </ul>

                <h3 style={subH3}>Access lifecycle</h3>
                <ul style={{ listStyle: 'none', padding: 0, margin: '0 0 16px', display: 'flex', flexDirection: 'column', gap: 12 }}>
                  {[
                    'Access is provisioned per client, per tool, with the minimum permissions needed for the role.',
                    'Multi-factor authentication is required on every system that holds client or company data.',
                    'When a team member rolls off an account or leaves xFusion, access is revoked the same business day, with documented confirmation.',
                    'Account managers review access lists on a recurring cadence and remove anything stale.',
                  ].map(b => (
                    <li key={b} style={bullet}>
                      <span style={checkBadge}><Icon name="check" size={12} /></span>
                      {b}
                    </li>
                  ))}
                </ul>
              </Container>
            </Section>

            <Section bg="paper-2" padding="lg" style={{ paddingTop: 64, paddingBottom: 64 }}>
              <Container narrow>
                <Eyebrow>Systems and infrastructure</Eyebrow>
                <h2 style={sectionH2}>How the technical layer is set up.</h2>
                <ul style={{ listStyle: 'none', padding: 0, margin: '0 0 16px', display: 'flex', flexDirection: 'column', gap: 12 }}>
                  {[
                    'TLS 1.2 or higher in transit; data at rest is encrypted on the cloud platforms we rely on.',
                    'Company-managed devices for the operations and account management teams, with disk encryption and endpoint protection enforced by policy.',
                    'Password manager with strong, unique credentials per system; shared accounts avoided as a rule.',
                    'Centralized logging and audit trails wherever the underlying tool supports them.',
                    'Vulnerability management: dependencies and platforms are patched promptly; critical issues are prioritized.',
                    'Network controls: production tooling sits behind authentication; sensitive admin functions are restricted to a small group.',
                    'Backups for company-owned systems run on a schedule appropriate to the data, with periodic restore checks.',
                  ].map(b => (
                    <li key={b} style={bullet}>
                      <span style={checkBadge}><Icon name="check" size={12} /></span>
                      {b}
                    </li>
                  ))}
                </ul>
              </Container>
            </Section>

            <Section bg="paper" padding="lg" style={{ paddingTop: 64, paddingBottom: 64 }}>
              <Container narrow>
                <Eyebrow>Data handling</Eyebrow>
                <h2 style={sectionH2}>What we do, and do not, do with client data.</h2>
                <ul style={{ listStyle: 'none', padding: 0, margin: '0 0 16px', display: 'flex', flexDirection: 'column', gap: 12 }}>
                  {[
                    'We process client data only to deliver the services in the agreement: respond to support tickets, run the helpdesk, manage the team, report on KPIs.',
                    'We do not sell client data and do not use it to train external AI models.',
                    'AI tools used in client workflows are scoped to the client\'s own environment and configured according to the client\'s instructions.',
                    'Client data is returned or deleted at the end of the engagement, on request.',
                    'For data we are the controller of (billing contacts, candidate information), retention follows our Privacy Policy.',
                  ].map(b => (
                    <li key={b} style={bullet}>
                      <span style={checkBadge}><Icon name="check" size={12} /></span>
                      {b}
                    </li>
                  ))}
                </ul>
              </Container>
            </Section>

            <Section bg="paper-2" padding="lg" style={{ paddingTop: 64, paddingBottom: 64 }}>
              <Container narrow>
                <Eyebrow>Vendors and Sub-processors</Eyebrow>
                <h2 style={sectionH2}>The third parties we rely on.</h2>
                <p style={body}>
                  We use established platforms for hosting, communication, payroll, helpdesk operations, and analytics. We choose vendors with mature security practices and review them periodically. A current list of named Sub-processors is available on request and is also referenced in our <a href="../dpa/" style={{ color: '#B8512C' }}>Data Processing Addendum</a>.
                </p>
              </Container>
            </Section>

            <Section bg="paper" padding="lg" style={{ paddingTop: 64, paddingBottom: 64 }}>
              <Container narrow>
                <Eyebrow>Incident response</Eyebrow>
                <h2 style={sectionH2}>If something goes wrong.</h2>
                <ul style={{ listStyle: 'none', padding: 0, margin: '0 0 16px', display: 'flex', flexDirection: 'column', gap: 12 }}>
                  {[
                    'Documented incident response process owned by xFusion leadership.',
                    'Suspected incidents are triaged immediately; impact and scope are confirmed before broader action.',
                    'Affected clients are notified without undue delay, with the facts we know and the steps we are taking.',
                    'Post-incident review captures root cause, remediation, and the durable change so it does not happen again.',
                  ].map(b => (
                    <li key={b} style={bullet}>
                      <span style={checkBadge}><Icon name="check" size={12} /></span>
                      {b}
                    </li>
                  ))}
                </ul>
              </Container>
            </Section>

            <Section bg="paper-2" padding="lg" style={{ paddingTop: 64, paddingBottom: 64 }}>
              <Container narrow>
                <Eyebrow>Compliance and documentation</Eyebrow>
                <h2 style={sectionH2}>What we will provide on request.</h2>
                <ul style={{ listStyle: 'none', padding: 0, margin: '0 0 16px', display: 'flex', flexDirection: 'column', gap: 12 }}>
                  {[
                    'Data Processing Addendum for clients with GDPR, UK GDPR, or CCPA / CPRA obligations.',
                    'Standard Contractual Clauses where required for international transfers.',
                    'Sub-processor list and notification of material changes.',
                    'Security questionnaire responses for client procurement teams.',
                    'NDA before any sensitive technical or operational details are shared.',
                  ].map(b => (
                    <li key={b} style={bullet}>
                      <span style={checkBadge}><Icon name="check" size={12} /></span>
                      {b}
                    </li>
                  ))}
                </ul>
                <p style={body}>
                  xFusion does not currently hold a SOC 2 attestation. We are happy to walk through our controls in detail and to share documentation against any framework you are aligning to internally.
                </p>
              </Container>
            </Section>

            <Section bg="paper" padding="lg" style={{ paddingTop: 64, paddingBottom: 96 }}>
              <Container narrow>
                <Eyebrow>Reporting a concern</Eyebrow>
                <h2 style={sectionH2}>Talk to us.</h2>
                <p style={body}>
                  If you believe you have found a vulnerability, observed suspicious activity involving xFusion, or have a security question, contact <a href="mailto:security@xfusion.io" style={{ color: '#B8512C' }}>security@xfusion.io</a>. We typically respond within one business day. Please do not include sensitive personal data in your initial message; we will set up a secure channel as needed.
                </p>
                <p style={body}>
                  For broader privacy questions, see our <a href="../privacy/" style={{ color: '#B8512C' }}>Privacy Policy</a> or email <a href="mailto:info@xfusion.io" style={{ color: '#B8512C' }}>info@xfusion.io</a>.
                </p>
              </Container>
            </Section>
          </main>
          <Footer />
        </div>
      );
    }
    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
