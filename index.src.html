  <script type="application/ld+json">{"@context":"https://schema.org","@type":"FAQPage","mainEntity":[{"@type":"Question","name":"Will they speak good English?","acceptedAnswer":{"@type":"Answer","text":"Every candidate sits through interviews with a real person where we check English skills, how they talk, and how they come across. Before you meet with anyone, you'll watch a Zoom recording of them, so you can judge for yourself instead of taking our word for it."}},{"@type":"Question","name":"What if the placement doesn't work out?","acceptedAnswer":{"@type":"Answer","text":"That's exactly what the 30-Day Risk-Free Trial is for. We recruit, vet, and place a senior, AI-trained customer support agent in your business. You work with them for 30 full days. If you're not satisfied for any reason, you walk away without paying anything. Not a deposit. Not a setup fee. Nothing. We absorb every dollar of recruiting, vetting, training, and placement we invested."}},{"@type":"Question","name":"Why is $3,900/mo the right price?","acceptedAnswer":{"@type":"Answer","text":"Two reasons. First, every agent we place is senior, with more experience than a typical support hire, and trained to use AI tools to handle the easy stuff. So one xFusion agent does a lot more work than a junior rep at a cheaper agency. The cost per ticket is actually lower. Second, $3,900 is about half what you'd pay for the same kind of person in the U.S., and it includes hiring, training, payroll, culture, and an account manager. No add-ons. No setup fees. No deposits."}},{"@type":"Question","name":"How long does the process take?","acceptedAnswer":{"@type":"Answer","text":"About 14 days from your discovery call to a candidate list in your inbox. We keep a pool of senior, AI-trained support candidates ready to go, which is why we can move that fast without cutting corners."}},{"@type":"Question","name":"Do you handle payroll and HR?","acceptedAnswer":{"@type":"Answer","text":"Yes, and it's part of the $3,900/mo. xFusion handles paying salaries, light HR, and time off. Your agent is hired as an independent contractor and managed by us, so you don't have to deal with international payroll. xFusion is not an Employer of Record, and the agent isn't your employee. We handle the paperwork so the setup stays simple."}},{"@type":"Question","name":"What roles can you fill?","acceptedAnswer":{"@type":"Answer","text":"Customer support, mostly. Every support agent we place is senior, trained to use AI, and able to handle Tier 1, Tier 2, and some cases that used to need an engineer's help. We also place inside sales people who work inbound leads (not cold calling) and AI operators who run AI tools alongside your team. If you need a different kind of role, ask on the discovery call. We'll be honest about whether we can help."}},{"@type":"Question","name":"Where does your talent come from?","acceptedAnswer":{"@type":"Answer","text":"Mostly the Philippines, with a strong group from Kenya. Since 2020 we've built deep networks in both countries and learned which candidates actually thrive in long-term support roles. Both markets have strong English-speaking professionals who treat support as a real career, not a stepping-stone."}},{"@type":"Question","name":"Is there a long-term contract?","acceptedAnswer":{"@type":"Answer","text":"No. The service is month-to-month with no minimum term. There's no deposit, no setup fee, and no fine print. The 30-Day Risk-Free Trial is the strongest expression of that: pay nothing for the first month, walk away free if it's not a fit."}},{"@type":"Question","name":"Do you replace American jobs?","acceptedAnswer":{"@type":"Answer","text":"No. Our work helps American small businesses keep growing and keep hiring at home where it matters most. Most of our clients use us for support jobs that are hard to fill at U.S. wages. Filling those jobs overseas lets owners spend more on the core jobs where U.S. hiring makes sense."}},{"@type":"Question","name":"Why not just hire locally for support work?","acceptedAnswer":{"@type":"Answer","text":"Senior support reps in the U.S. who know AI cost $80,000 to $100,000+ per year, take months to find, and often quit within 18 months. With xFusion, you get a senior, AI-trained agent for about half that cost, with the culture work built in to keep them around long-term. You also skip the search, the training, the payroll setup, and the culture work. We handle all of it."}},{"@type":"Question","name":"What about after-hours coverage?","acceptedAnswer":{"@type":"Answer","text":"Your placed agent works full-time hours, just like any team member. Because they're based in the Philippines or Kenya, you have room to structure coverage however you want. Some clients align the agent to U.S. business hours. Others stagger shifts to cover evenings or weekends. Some build a team that covers around the clock. You pick the schedule; we handle the management."}},{"@type":"Question","name":"How do I keep a remote team member engaged long-term?","acceptedAnswer":{"@type":"Answer","text":"This is one of the most common worries we hear, which is why Culture & Engagement is included in the $3,900/mo. We run virtual and in-person team-building events, contests, branded swag, birthday and anniversary gifts, and structured holiday gifting. Pair that with a role that pays a real living wage in the agent's local economy, and you get someone who builds a career on your team rather than rotating through."}},{"@type":"Question","name":"Why not just use a chatbot?","acceptedAnswer":{"@type":"Answer","text":"AI on its own handles the easy 60% of support work well. The hard 40% (angry customers, weird cases, judgment calls, sensitive issues) is where chatbot-only setups break, often in public. xFusion's senior agents use AI as a tool, not a replacement. They let AI handle the easy stuff and step in for the moments that matter. You get the speed of AI plus the judgment and warmth of a person, instead of picking one and living with the limits."}},{"@type":"Question","name":"What does \"AI-trained\" actually mean in practice?","acceptedAnswer":{"@type":"Answer","text":"It means your agent is trained to use AI tools (like Claude Code, Claude Cowork, and others) every day. They write replies with AI's help, sort and route tickets with AI, and oversee AI tools that handle the routine, high-volume cases. Their experience tells them when to trust what AI gives them and when to step in. The result: one person handling far more work than they could alone, without giving up the quality and warmth your customers expect."}}]}</script>
