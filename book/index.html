  <!-- SavvyCal inline embed, prefilled from the funnel's stored lead. -->
  <script>window.SavvyCal=window.SavvyCal||function(){(SavvyCal.q=SavvyCal.q||[]).push(arguments)};</script>
  <script async src="https://embed.savvycal.com/v1/embed.js"></script>
  <script>
    (function () {
      var lead = (window.xfAttribution && window.xfAttribution.getLead()) || {};
      var attribution = (window.xfAttribution && window.xfAttribution.get()) || {};

      SavvyCal('init');
      var options = {
        link: 'xfusion/lets-chat',
        selector: '#scheduler',
        hideBanner: true,
        theme: 'light',
        metadata: { source: 'xfusion.io/book' },
      };
      if (lead.email) options.email = lead.email;
      if (lead.name) options.displayName = lead.name;
      SavvyCal('inline', options);

      // If the embed script fails (blocked, offline), show the email fallback.
      window.setTimeout(function () {
        var host = document.getElementById('scheduler');
        if (host && !host.firstChild) {
          document.getElementById('scheduler-fallback').style.display = 'block';
        }
      }, 4000);

      // The conversion moment: SavvyCal announces a completed booking to the
      // parent page. Push the event for GTM (Google Ads conversion fires on
      // it), then move to the confirmation page.
      var fired = false;
      window.addEventListener('savvycal.scheduled', function (ev) {
        if (fired) return;
        fired = true;

        var redirected = false;
        var goToConfirmation = function () {
          if (redirected) return;
          redirected = true;
          window.location.href = '/call-booked/';
        };

        // Tell GoHighLevel + the Sheet log this lead booked, so nurture
        // sequences stop. keepalive survives the redirect below.
        if (window.xfAttribution) {
          window.xfAttribution.sendLead('call_booked', {
            email: lead.email || '',
            name: lead.name || '',
          });
        }

        window.dataLayer = window.dataLayer || [];
        window.dataLayer.push({
          event: 'discovery_call_booked',
          email_hash: lead.email_hash || undefined,
          gclid: attribution.gclid || undefined,
          business_type: lead.business_type || undefined,
          eventCallback: goToConfirmation,
          eventTimeout: 1500,
        });
        // Belt and braces: redirect even if GTM is blocked and never
        // invokes eventCallback.
        window.setTimeout(goToConfirmation, 1800);
      });
    })();
  </script>
