<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Privacy policy | xFusion</title>
  <meta name="description" content="xFusion privacy policy. How we collect, use, and protect personal information for clients, candidates, team members, and website visitors. Contact info@xfusion.io with questions.">
  <link rel="stylesheet" href="../colors_and_type.css">
  <style>
    body { background: #F7F2EB; }
    a { transition: color 160ms cubic-bezier(0.4,0,0.6,1); }
    a:hover { color: #A0451F; }
    button:focus-visible, a:focus-visible { outline: 2px solid #B8512C; outline-offset: 3px; border-radius: 6px; }
  </style>
  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" crossorigin="anonymous"></script>
  <!-- Google Tag Manager -->
  <script>(function(w,d,s,l,i){w[l]=w[l]||[];w[l].push({'gtm.start':
  new Date().getTime(),event:'gtm.js'});var f=d.getElementsByTagName(s)[0],
  j=d.createElement(s),dl=l!='dataLayer'?'&l='+l:'';j.async=true;j.src=
  'https://www.googletagmanager.com/gtm.js?id='+i+dl;f.parentNode.insertBefore(j,f);

</head>
<body>
  <!-- Google Tag Manager (noscript) -->
  <noscript><iframe src="https://www.googletagmanager.com/ns.html?id=GTM-KX8T76BC"
  height="0" width="0" style="display:none;visibility:hidden"></iframe></noscript>
  <!-- End Google Tag Manager (noscript) -->

  <div id="root"></div>
  <script type="text/babel">
    const { useState, useEffect } = React;

    function Container({ children, narrow = false, style = {} }) { return <div style={{ maxWidth: narrow ? 760 : 1200, margin: '0 auto', padding: '0 24px', ...style }}>{children}</div>; }
    function Section({ children, bg = 'paper', padding = 'lg', id, style = {} }) {
      const bgs = { paper: '#F7F2EB', 'paper-2': '#EFE8DD', butter: '#F8EBC9', 'butter-strong': '#F0D9A8', forest: '#2C4A3E' };
      const pads = { sm: '56px 0', md: '80px 0', lg: '112px 0' };
      return <section id={id} style={{ background: bgs[bg], padding: pads[padding], ...style }}>{children}</section>;
    }
    function Eyebrow({ children, color = '#6B5F56' }) {
      return <div style={{ fontFamily: "'IBM Plex Sans', sans-serif", fontSize: 12, fontWeight: 600, textTransform: 'uppercase', letterSpacing: '0.14em', color, marginBottom: 18 }}>{children}</div>;
    }
    function Button({ children, variant = 'primary', size = 'md', href, style = {}, target, rel }) {
      const [hover, setHover] = useState(false);
      const [pressed, setPressed] = useState(false);
      const sizes = { sm: { padding: '8px 14px', fontSize: 13 }, md: { padding: '12px 22px', fontSize: 15 }, lg: { padding: '16px 28px', fontSize: 16 } };
      let bg, color, border;
      if (variant === 'primary') { bg = pressed ? '#863818' : hover ? '#A0451F' : '#B8512C'; color = '#F7F2EB'; border = '1px solid transparent'; }
      else if (variant === 'secondary') { bg = hover ? '#EFE8DD' : 'transparent'; color = '#1F1A17'; border = '1px solid #B7A993'; }
      else { bg = hover ? 'rgba(31,26,23,0.04)' : 'transparent'; color = '#1F1A17'; border = '1px solid transparent'; }
      const Tag = href ? 'a' : 'button';
  const isExternal = href && /^https?:\/\//.test(href);
  const computedTarget = target || (isExternal ? '_blank' : undefined);
  const computedRel = rel || (isExternal ? 'noopener noreferrer' : undefined);
  const linkAttrs = href ? { href, target: computedTarget, rel: computedRel } : {};
      return <Tag {...linkAttrs} onMouseEnter={() => setHover(true)} onMouseLeave={() => { setHover(false); setPressed(false); }} onMouseDown={() => setPressed(true)} onMouseUp={() => setPressed(false)} style={{ background: bg, color, border, borderRadius: 8, fontFamily: "'IBM Plex Sans', sans-serif", fontWeight: 500, cursor: 'pointer', lineHeight: 1.1, textDecoration: 'none', display: 'inline-flex', alignItems: 'center', gap: 8, transition: 'all 160ms cubic-bezier(0.4,0,0.6,1)', whiteSpace: 'nowrap', ...sizes[size], ...style }}>{children}</Tag>;
    }
    const Icons = {
      menu: <g><path d="M3 12h18"/><path d="M3 6h18"/><path d="M3 18h18"/></g>,
      x: <g><path d="M18 6L6 18"/><path d="M6 6l12 12"/></g>,
      linkedin: <g><path d="M16 8a6 6 0 0 1 6 6v7h-4v-7a2 2 0 0 0-4 0v7h-4v-7a6 6 0 0 1 6-6z"/><rect x="2" y="9" width="4" height="12"/><circle cx="4" cy="4" r="2"/></g>,
      twitter: <path d="M22 4s-.7 2.1-2 3.4c1.6 10-9.4 17.3-18 11.6 2.2.1 4.4-.6 6-2-3 0-6-2.5-6-5.5 1 .5 2 .5 3 0-3-1-5-4-5-7 1 .5 2 1 3 1-3-2-3-7 0-9 4 5 10 7.5 16 7-.7-3 1.2-6 4-6 1.5 0 3 .8 4 2 1-.2 2-.5 3-1z"/>,
      instagram: <g><rect x="2" y="2" width="20" height="20" rx="5"/><circle cx="12" cy="12" r="4"/></g>,
      facebook: <path d="M18 2h-3a5 5 0 0 0-5 5v3H7v4h3v8h4v-8h3l1-4h-4V7a1 1 0 0 1 1-1h3z"/>,
      youtube: <g><path d="M22.5 6.5a2.8 2.8 0 0 0-2-2C18.7 4 12 4 12 4s-6.7 0-8.5.5a2.8 2.8 0 0 0-2 2C1 8.3 1 12 1 12s0 3.7.5 5.5a2.8 2.8 0 0 0 2 2C5.3 20 12 20 12 20s6.7 0 8.5-.5a2.8 2.8 0 0 0 2-2c.5-1.8.5-5.5.5-5.5s0-3.7-.5-5.5z"/><path d="M10 15l5-3-5-3z" fill="currentColor"/></g>,
    };
    function Icon({ name, size = 20 }) { return <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.6" strokeLinecap="round" strokeLinejoin="round" style={{ flexShrink: 0, display: 'inline-block' }}>{Icons[name]}</svg>; }

    function Nav({ current }) {
      const [scrolled, setScrolled] = useState(false);
      const [open, setOpen] = useState(false);
      useEffect(() => { const onScroll = () => setScrolled(window.scrollY > 8); window.addEventListener('scroll', onScroll); return () => window.removeEventListener('scroll', onScroll); }, []);
      const linkStyle = (active) => ({ color: active ? '#B8512C' : '#1F1A17', textDecoration: 'none', fontFamily: "'IBM Plex Sans', sans-serif", fontWeight: active ? 500 : 400, fontSize: 14, whiteSpace: 'nowrap' });
      const links = [
        { label: 'Home', href: '../', key: 'home' },
        { label: 'About', href: '../about/', key: 'about' },
        { label: 'Case studies', href: '../case-studies/', key: 'case-studies' },
        { label: 'Careers', href: '../careers/', key: 'careers' },
        { label: 'Blog', href: 'https://blog.xfusion.io', key: 'blog' },
      ];
      return (
        <nav style={{ position: 'sticky', top: 0, zIndex: 50, background: scrolled ? 'rgba(247, 242, 235, 0.88)' : 'transparent', backdropFilter: scrolled ? 'blur(12px)' : 'none', WebkitBackdropFilter: scrolled ? 'blur(12px)' : 'none', borderBottom: scrolled ? '1px solid #D9CFBF' : '1px solid transparent', transition: 'all 240ms cubic-bezier(0.4,0,0.6,1)' }}>
          <Container>
            <div style={{ height: 72, display: 'flex', alignItems: 'center', gap: 32 }}>
              <a href="../" style={{ display: 'flex', alignItems: 'baseline', textDecoration: 'none' }} aria-label="xFusion home">
                <img src="../assets/xfusion-logo.png" alt="xFusion" style={{ height: 36, width: "auto", display: "block" }} />
              </a>
              <div className="nav-links" style={{ display: 'flex', gap: 28, marginLeft: 24 }}>
                {links.map(l => <a key={l.key} href={l.href} style={linkStyle(current === l.key)}>{l.label}</a>)}
              </div>
              <div style={{ marginLeft: 'auto', display: 'flex', gap: 12, alignItems: 'center' }}>
                <Button variant="primary" size="sm" href="https://savvycal.com/xfusion/lets-chat">Book a Discovery Call</Button>
                <button className="nav-mobile-toggle" onClick={() => setOpen(!open)} style={{ display: 'none', background: 'transparent', border: '1px solid #B7A993', borderRadius: 8, padding: 8, cursor: 'pointer', color: '#1F1A17' }} aria-label="Toggle menu"><Icon name={open ? 'x' : 'menu'} size={20} /></button>
              </div>
            </div>
            {open && (
              <div className="nav-mobile-menu" style={{ display: 'none', flexDirection: 'column', gap: 16, padding: '8px 0 24px', borderTop: '1px solid #D9CFBF' }}>
                {links.map(l => <a key={l.key} href={l.href} style={linkStyle(current === l.key)} onClick={() => setOpen(false)}>{l.label}</a>)}
              </div>
            )}
          </Container>
          <style>{`@media (max-width: 800px) { .nav-links { display: none !important; } .nav-mobile-toggle { display: inline-flex !important; } .nav-mobile-menu { display: flex !important; } }`}</style>
        </nav>
      );
    }

    function Footer() {
      const cols = [
        { title: 'Product',  links: [
          ['Pricing',       '../#pricing'],
          ['Case studies',  '../case-studies/'],
        ]},
        { title: 'Company',  links: [
          ['About',    '../about/'],
          ['Careers',  '../careers/'],
          ['Contact', '../contact/'],
        ]},
        { title: 'Resources', links: [
          ['FAQ',           '../#faq'],
          ['Blog',          '../blog/'],
        ]},
        { title: 'Legal',    links: [
          ['Privacy',   '../privacy/'],
          ['DPA',       '../dpa/'],
          ['Security',  '../security/'],
        ]},
      ];
      const FOREST  = '#2C4A3E';
      const PAPER   = '#F7F2EB';
      const BUTTER  = '#F0D9A8';
      const DIVIDER = 'rgba(247, 242, 235, 0.14)';
      const MUTED   = 'rgba(247, 242, 235, 0.65)';
      return (
        <footer style={{ background: FOREST, color: PAPER }}>
          <Container>
            <div className="footer-top" style={{ display: 'grid', gridTemplateColumns: '1.4fr 1fr', gap: 32, alignItems: 'center', paddingTop: 64, paddingBottom: 40, borderBottom: `1px solid ${DIVIDER}` }}>
              <div>
                <a href="../" style={{ display: 'inline-flex', alignItems: 'center', gap: 10, marginBottom: 14, textDecoration: 'none' }}>
                  <img src="../assets/xfusion-logo-on-dark.png" alt="xFusion" style={{ height: 36, width: "auto", display: "block" }} />
                  
                </a>
                <p style={{ fontFamily: "'Source Serif 4', serif", fontSize: 18, lineHeight: 1.5, color: BUTTER, margin: 0, maxWidth: 480, fontStyle: 'italic', fontWeight: 400 }}>
                  Senior, AI-trained customer support agents for small businesses. Since 2020.
                </p>
              </div>
              
            </div>
            <div className="footer-grid" style={{ display: 'grid', gridTemplateColumns: 'repeat(4, 1fr)', gap: 40, paddingTop: 48, paddingBottom: 40 }}>
              {cols.map(col => (
                <div key={col.title}>
                  <div style={{ fontFamily: "'JetBrains Mono', monospace", fontSize: 11, fontWeight: 500, textTransform: 'uppercase', letterSpacing: '0.14em', color: MUTED, marginBottom: 18 }}>{col.title}</div>
                  <ul style={{ listStyle: 'none', margin: 0, padding: 0, display: 'flex', flexDirection: 'column', gap: 10 }}>
                    {col.links.map(([label, href]) => (
                      <li key={label}>
                        <a href={href} className="footer-link" style={{ color: PAPER, textDecoration: 'none', fontFamily: "'IBM Plex Sans', sans-serif", fontSize: 15, lineHeight: 1.4 }}>{label}</a>
                      </li>
                    ))}
                  </ul>
                </div>
              ))}
            </div>
            <div className="footer-legal" style={{ paddingTop: 24, paddingBottom: 32, borderTop: `1px solid ${DIVIDER}`, display: 'flex', justifyContent: 'space-between', alignItems: 'center', fontFamily: "'IBM Plex Sans', sans-serif", fontSize: 13, color: MUTED, flexWrap: 'wrap', gap: 12 }}>
              <div>© 2026 xFusion. All rights reserved.</div>
              <div>Made with care across the Philippines, Kenya, and the United States.</div>
            </div>
          </Container>
          <style>{`
            .footer-link:hover { color: ${BUTTER}; }
            @media (max-width: 900px) {
              .footer-top { grid-template-columns: 1fr !important; gap: 20px !important; }
              .footer-cta { justify-content: flex-start !important; }
              .footer-grid { grid-template-columns: 1fr 1fr !important; gap: 32px !important; }
              .footer-legal { flex-direction: column; align-items: flex-start !important; }
            }
            @media (max-width: 520px) { .footer-grid { grid-template-columns: 1fr !important; gap: 28px !important; } }
          `}</style>
        </footer>
      );
    }

    function App() {
      return (
        <div data-screen-label="Privacy">
          <Nav current="privacy" />
          <main>
            <Section bg="paper" padding="lg" style={{ paddingTop: 96, paddingBottom: 96 }}>
              <Container narrow>
                <Eyebrow>Legal</Eyebrow>
                <h1 style={{ fontFamily: "'Source Serif 4', serif", fontSize: 'clamp(40px, 5.6vw, 76px)', fontWeight: 400, lineHeight: 1.05, letterSpacing: '-0.025em', margin: '0 0 28px', color: '#1F1A17', textWrap: 'balance' }}>
                  Privacy policy.
                </h1>
                <div style={{ fontFamily: "'JetBrains Mono', monospace", fontSize: 12, textTransform: 'uppercase', letterSpacing: '0.14em', color: '#6B5F56', marginBottom: 40 }}>
                  Last updated: April 29, 2026
                </div>

                <div style={{ fontFamily: "'IBM Plex Sans', sans-serif", fontSize: 17, lineHeight: 1.7, color: '#3A322D' }}>
                  <p style={{ margin: '0 0 24px' }}>
                    This Privacy Policy explains how xFusion, Inc. ("xFusion," "we," "our," or "us") collects, uses, shares, and protects personal information when you visit xfusion.io, request a Discovery Call, become a client, apply for a role, work with us as a contractor, or otherwise interact with our services. We take privacy seriously and only collect what we need to run the business and serve our clients well.
                  </p>
                  <p style={{ margin: '0 0 24px' }}>
                    If you have questions about this policy or your information, contact us at <a href="mailto:info@xfusion.io" style={{ color: '#B8512C' }}>info@xfusion.io</a>.
                  </p>

                  <h2 style={{ fontFamily: "'Source Serif 4', serif", fontSize: 28, fontWeight: 600, lineHeight: 1.2, color: '#1F1A17', margin: '40px 0 16px' }}>1. Who we are</h2>
                  <p style={{ margin: '0 0 16px' }}>
                    xFusion, Inc. is a U.S. company that provides fully managed customer support services. We recruit, vet, place, train, and manage senior customer support team members on behalf of our clients. Team members are engaged as independent contractors. xFusion is the controller of personal information collected through our website and recruiting funnel, and a processor of personal information that flows through our services on behalf of our clients.
                  </p>

                  <h2 style={{ fontFamily: "'Source Serif 4', serif", fontSize: 28, fontWeight: 600, lineHeight: 1.2, color: '#1F1A17', margin: '40px 0 16px' }}>2. Information we collect</h2>

                  <h3 style={{ fontFamily: "'Source Serif 4', serif", fontSize: 20, fontWeight: 600, lineHeight: 1.3, color: '#1F1A17', margin: '28px 0 12px' }}>2.1 Information you give us</h3>
                  <ul style={{ margin: '0 0 16px', paddingLeft: 22 }}>
                    <li style={{ marginBottom: 8 }}>Contact details (name, email, company, role, phone) when you book a Discovery Call, fill out a form, or email us.</li>
                    <li style={{ marginBottom: 8 }}>Application materials (resume, work history, references, portfolio links, video recordings, assessment results) when you apply for a role with us or our clients.</li>
                    <li style={{ marginBottom: 8 }}>Payment and billing information when you become a client, processed by our payment providers.</li>
                    <li style={{ marginBottom: 8 }}>Anything else you choose to send us by email, on a call, or through a connected tool.</li>
                  </ul>

                  <h3 style={{ fontFamily: "'Source Serif 4', serif", fontSize: 20, fontWeight: 600, lineHeight: 1.3, color: '#1F1A17', margin: '28px 0 12px' }}>2.2 Information collected automatically</h3>
                  <ul style={{ margin: '0 0 16px', paddingLeft: 22 }}>
                    <li style={{ marginBottom: 8 }}>Device and usage data (IP address, browser type, pages viewed, referrer, approximate location) when you visit xfusion.io.</li>
                    <li style={{ marginBottom: 8 }}>Cookies and similar technologies for analytics, performance, and to remember your preferences. You can control cookies through your browser settings.</li>
                  </ul>

                  <h3 style={{ fontFamily: "'Source Serif 4', serif", fontSize: 20, fontWeight: 600, lineHeight: 1.3, color: '#1F1A17', margin: '28px 0 12px' }}>2.3 Information from third parties</h3>
                  <ul style={{ margin: '0 0 16px', paddingLeft: 22 }}>
                    <li style={{ marginBottom: 8 }}>Background check vendors, reference checks, public professional profiles (LinkedIn), and assessment platforms used in our hiring pipeline.</li>
                    <li style={{ marginBottom: 8 }}>Client-provided information about end customers, surfaced through helpdesk tools and CRMs we are given access to in order to perform the support work.</li>
                  </ul>

                  <h2 style={{ fontFamily: "'Source Serif 4', serif", fontSize: 28, fontWeight: 600, lineHeight: 1.2, color: '#1F1A17', margin: '40px 0 16px' }}>3. How we use information</h2>
                  <ul style={{ margin: '0 0 16px', paddingLeft: 22 }}>
                    <li style={{ marginBottom: 8 }}>To deliver our services: place team members, train them, manage payroll, run account management.</li>
                    <li style={{ marginBottom: 8 }}>To recruit and vet candidates through the TraitX framework.</li>
                    <li style={{ marginBottom: 8 }}>To respond to inquiries, schedule and run Discovery Calls, and follow up on proposals.</li>
                    <li style={{ marginBottom: 8 }}>To bill clients and process contractor payments.</li>
                    <li style={{ marginBottom: 8 }}>To improve our website, marketing, and operations.</li>
                    <li style={{ marginBottom: 8 }}>To send service messages and, with your consent where required, marketing emails. You can unsubscribe at any time.</li>
                    <li style={{ marginBottom: 8 }}>To comply with legal obligations, enforce our agreements, and protect xFusion, our clients, our team, and the public.</li>
                  </ul>

                  <h2 style={{ fontFamily: "'Source Serif 4', serif", fontSize: 28, fontWeight: 600, lineHeight: 1.2, color: '#1F1A17', margin: '40px 0 16px' }}>4. Legal bases for processing (EEA / UK)</h2>
                  <p style={{ margin: '0 0 16px' }}>
                    If you are in the European Economic Area or the United Kingdom, we process your personal information under one or more of the following legal bases: performance of a contract, our legitimate interests in running our business, your consent (where required), and compliance with legal obligations.
                  </p>

                  <h2 style={{ fontFamily: "'Source Serif 4', serif", fontSize: 28, fontWeight: 600, lineHeight: 1.2, color: '#1F1A17', margin: '40px 0 16px' }}>5. How we share information</h2>
                  <p style={{ margin: '0 0 16px' }}>
                    We do not sell personal information. We share it only with:
                  </p>
                  <ul style={{ margin: '0 0 16px', paddingLeft: 22 }}>
                    <li style={{ marginBottom: 8 }}>Service providers who help us run the business under contracts that require confidentiality and appropriate safeguards. This includes payroll processors, payment platforms, hosting and analytics tools, helpdesk and CRM platforms, communication tools, and background check vendors.</li>
                    <li style={{ marginBottom: 8 }}>Our clients, when you apply for a role with us and we present you as a candidate (with your knowledge), or when you reach out to us through a referral from a client.</li>
                    <li style={{ marginBottom: 8 }}>Government authorities, regulators, and other parties when required by law or to protect our legal rights.</li>
                    <li style={{ marginBottom: 8 }}>An acquirer, successor, or assignee in connection with a merger, financing, acquisition, or sale of assets, with appropriate notice where required.</li>
                  </ul>

                  <h2 style={{ fontFamily: "'Source Serif 4', serif", fontSize: 28, fontWeight: 600, lineHeight: 1.2, color: '#1F1A17', margin: '40px 0 16px' }}>6. International transfers</h2>
                  <p style={{ margin: '0 0 16px' }}>
                    xFusion operates across the United States, the Philippines, and Kenya, and uses service providers in additional countries. Personal information may be transferred to and processed in countries with different data protection laws than your own. Where required by law, we put appropriate safeguards in place, including standard contractual clauses.
                  </p>

                  <h2 style={{ fontFamily: "'Source Serif 4', serif", fontSize: 28, fontWeight: 600, lineHeight: 1.2, color: '#1F1A17', margin: '40px 0 16px' }}>7. Data retention</h2>
                  <p style={{ margin: '0 0 16px' }}>
                    We keep personal information for as long as we need it for the purposes described in this policy, plus a reasonable period afterward to meet legal, accounting, or reporting requirements. When we no longer need it, we delete or anonymize it.
                  </p>

                  <h2 style={{ fontFamily: "'Source Serif 4', serif", fontSize: 28, fontWeight: 600, lineHeight: 1.2, color: '#1F1A17', margin: '40px 0 16px' }}>8. Your rights</h2>
                  <p style={{ margin: '0 0 16px' }}>
                    Depending on where you live, you may have rights to access, correct, delete, restrict, or object to our processing of your personal information, to withdraw consent, to data portability, and to lodge a complaint with a supervisory authority. To exercise any of these rights, email <a href="mailto:info@xfusion.io" style={{ color: '#B8512C' }}>info@xfusion.io</a>. We will respond within the timeframes required by applicable law.
                  </p>
                  <p style={{ margin: '0 0 16px' }}>
                    California residents have additional rights under the CCPA / CPRA, including the right to know what categories of personal information we collect, the right to delete, the right to correct, the right to opt out of any sale or sharing of personal information (we do not sell), and the right to non-discrimination for exercising these rights.
                  </p>

                  <h2 style={{ fontFamily: "'Source Serif 4', serif", fontSize: 28, fontWeight: 600, lineHeight: 1.2, color: '#1F1A17', margin: '40px 0 16px' }}>9. Security</h2>
                  <p style={{ margin: '0 0 16px' }}>
                    We use administrative, technical, and physical safeguards designed to protect personal information from unauthorized access, disclosure, alteration, or destruction. No method of transmission or storage is 100% secure, but we work to keep information protected and to limit access to those who need it. See our <a href="../security/" style={{ color: '#B8512C' }}>Security page</a> for more detail.
                  </p>

                  <h2 style={{ fontFamily: "'Source Serif 4', serif", fontSize: 28, fontWeight: 600, lineHeight: 1.2, color: '#1F1A17', margin: '40px 0 16px' }}>10. Children's privacy</h2>
                  <p style={{ margin: '0 0 16px' }}>
                    Our services are not directed to children under 16. We do not knowingly collect personal information from children. If you believe a child has provided us with personal information, contact us and we will delete it.
                  </p>

                  <h2 style={{ fontFamily: "'Source Serif 4', serif", fontSize: 28, fontWeight: 600, lineHeight: 1.2, color: '#1F1A17', margin: '40px 0 16px' }}>11. Changes to this policy</h2>
                  <p style={{ margin: '0 0 16px' }}>
                    We may update this policy from time to time. When we do, we will revise the "Last updated" date at the top. Material changes will be communicated through our website or by email where appropriate.
                  </p>

                  <h2 style={{ fontFamily: "'Source Serif 4', serif", fontSize: 28, fontWeight: 600, lineHeight: 1.2, color: '#1F1A17', margin: '40px 0 16px' }}>12. Contact us</h2>
                  <div style={{ background: '#EFE8DD', border: '1px solid #D9CFBF', borderRadius: 12, padding: 24, marginTop: 8 }}>
                    <p style={{ margin: '0 0 8px' }}>
                      <strong>xFusion, Inc.</strong>
                    </p>
                    <p style={{ margin: 0 }}>
                      Email: <a href="mailto:info@xfusion.io" style={{ color: '#B8512C' }}>info@xfusion.io</a>
                    </p>
                  </div>
                </div>
              </Container>
            </Section>
          </main>
          <Footer />
        </div>
      );
    }
    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
