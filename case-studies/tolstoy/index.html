const aboutParagraphs = [
  "Tolstoy is a video commerce platform used by more than 5,000 Shopify and non-Shopify brands, including Culture Kings and LSKD. Founded in Israel, the company built its reputation on interactive, shoppable video that drops directly into the customer journey without slowing the site down.",
  "The product is built around short-form video. Brands use Tolstoy to create shoppable video flows that connect the consumer to the product. The numbers back the approach: Tolstoy delivers an average fourfold increase in time spent on a site and doubles the likelihood of repeat purchases. The platform also doubles as a data engine, surfacing engagement insights that help brands sharpen targeting and convert more buyers.",

const challengeParagraphs = [
  "When Tolstoy's leadership team first sat down with xFusion's co-founder Jim in the summer of 2022, the company was buried. Customer support volume was climbing fast. The single internal team member responsible for the inbox was on the way out, and there was no plan B for replacing them.",
  "The hole was bigger than one role. Tolstoy needed coverage across email and live chat, plus concierge onboarding for new brands, customer-facing documentation, a helpdesk that needed real workflow improvements, and ad-hoc client calls. Every piece of that work touched the customer experience, and every piece of it had been getting half the attention it needed while the team focused on shipping product.",
  "The leadership team did not want to spin up a recruiting effort, train a team from scratch, and add another management layer to an already stretched operation. They wanted a partner who could absorb the entire customer support function and run it the way Tolstoy would run it themselves, without making the founders the back-up reps.",
  "The bar was high. Tolstoy's brand is built on authenticity and human connection between brands and consumers. Whoever handled their support had to carry that voice in every reply.",
];

const solutionParagraphs = [
  "xFusion started with the most urgent piece: a transitional support coverage plan that closed the gap before the internal team member's last day. From there, the engagement expanded fast.",
  "The first xFusion agent was trained on concierge onboarding by walking new Shopify and non-Shopify brands through Tolstoy's product over video calls. As the rhythm settled in, xFusion rebuilt the helpdesk underneath the day-to-day work: saved replies, streamlined workflows, internal documentation for the team, and external help articles for self-service customers. None of that existed in any organized form before the partnership started.",
  "As Tolstoy's enterprise pipeline grew, xFusion stood up a Tier 2 team, branded internally as \"Solutions Engineers.\" This group handled escalations, bug triage, complex troubleshooting, and the custom-code requests that came in from larger clients. They also followed up on client activations as part of Tolstoy's onboarding process, making sure every tag, escalation, and request matched the client's specific setup. xFusion's Tier 2 lead worked directly with Tolstoy's Head of Growth on the operational efficiency of the activations department.",
  "The framing Tolstoy and xFusion landed on was simple: an extension of the Tolstoy team. One coordinated group covering Tier 1, Tier 2, onboarding, documentation, and reporting, all managed by xFusion through dedicated account managers, all aligned to Tolstoy's brand voice and product workflows.",
];

const resultsParagraphs = [
  "The partnership launched on August 18, 2022. Within the first months, the xFusion team and Dov had a working KPI framework in place, weekly reporting was running, and the help article library was being built out from scratch. Customers noticed.",
  "The clearest signal came from Shopify's app store. As the support experience improved, Tolstoy started collecting 5-star reviews tied directly to better customer support, and the app's ranking jumped 90 points. For a video commerce platform competing for visibility on Shopify, that kind of move materially changes how many new brands discover and trust the product.",
  "The numbers under the hood improved too. Before xFusion, roughly one in three customer conversations had to be reopened, the standard sign that a first reply did not actually solve the problem. After xFusion stabilized the workflow and the team grew comfortable with the product, that reopen rate dropped sharply. In a single month, March 1 through March 31, 2023, the xFusion team autonomously handled 584 tickets. No founder approvals, no escalations to internal Tolstoy staff, just a trained team running the function.",
