<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>SkyFi case study | xFusion</title>
  <meta name="description" content="How SkyFi partnered with xFusion to scale customer support across 185 countries, holding a 91.9% CSAT score and a 36-minute average response time around the clock." />
  <link rel="stylesheet" href="colors_and_type.css" />
  <style>
    html { scroll-behavior: smooth; }
    body { background: #F7F2EB; }
    /* Tighten anchor offset under sticky nav */
    section[id] { scroll-margin-top: 72px; }
    /* Hairline section divider used between Paper-on-Paper sections */
    .rule-soft { border: 0; border-top: 1px solid #E6DCCB; max-width: 720px; margin: 0 auto; }
  </style>

  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel" src="components/Primitives.jsx"></script>
  <script type="text/babel" src="components/Nav.jsx"></script>
  <script type="text/babel" src="components/PageHeader.jsx"></script>
  <script type="text/babel" src="components/OverviewBox.jsx"></script>
  <script type="text/babel" src="components/LongForm.jsx"></script>
  <script type="text/babel" src="components/TestimonialFeature.jsx"></script>
  <script type="text/babel" src="components/MetricCallout.jsx"></script>
  <script type="text/babel" src="components/ShoutoutGrid.jsx"></script>
  <script type="text/babel" src="components/CTASection.jsx"></script>
  <script type="text/babel" src="components/Footer.jsx"></script>

  <script type="text/babel">
    function App() {
      const overviewRows = [
        { label: 'Industry', value: 'Satellite imagery and geospatial intelligence (SaaS)' },
        { label: 'Country', value: 'United States' },
        { label: 'Challenge', value: 'Scale customer support across a global, 24/7 customer base spanning 185 countries while keeping CSAT high and response times fast on a technical product that spans optical, SAR, and multispectral imaging.' },
        { label: 'Solution', value: "A dedicated xFusion team trained in SkyFi's Earth observation product, integrated into SkyFi's internal systems, providing round-the-clock coverage and Tier 2 technical depth." },
        { label: 'Results', value: "91.9% customer satisfaction score. 36-minute average response time. Round-the-clock global coverage that freed SkyFi's leadership to focus on the core product." },
      ];

      const aboutParagraphs = [
        'SkyFi makes on-demand, high-resolution Earth observation data and analytics available to anyone with a smartphone, tablet, or computer. The company runs a network of more than 100 satellites and is on a mission, in their words, to "easify access to geospatial data so that businesses can solve their toughest problems and individuals can explore their boundless curiosity."',
        'The company started with a simple idea: open up access to Earth observation data. Satellite imagery had historically been locked behind enterprise contracts, complex tooling, and a steep technical learning curve. SkyFi built a platform that closes the gap between raw satellite data and the people who actually want to use it. Their apps and enterprise-grade API serve customers across agriculture, real estate, mining, urban development, environmental monitoring, and more.',
        'The numbers tell the rest of the story. Over 20,000 registered accounts. Customers in 185 countries. Data sensors including optical, SAR, and multispectral imaging. SkyFi has grown into a major player in the Earth observation industry, and they did it by simplifying something that used to be very hard.',
        'That growth created a customer support problem. A simple-to-use product attracts a wide audience. A wide audience asks a lot of questions. And those questions arrive at every hour of the day from every corner of the globe.',
      ];

      const challengeParagraphs = [
        "SkyFi's growth in the global market created a tough operational problem: how do you scale customer support without losing the quality that made you grow in the first place?",
        'The customer base was international. The product was technical. The volume was rising. And every time SkyFi closed another funding round or shipped another expansion, the pressure to deliver excellent customer service grew with it.',
        'Three things made this harder than a typical CS scaling problem.',
        'First, the time zones. Customers in 185 countries are awake at different hours, and they expect answers when they ask, not when an office in Texas opens up the next morning. Coverage had to be genuinely 24/7, not "we\u2019ll get to you Monday."',
        "Second, the technical depth. SkyFi's product spans optical imaging, SAR (synthetic aperture radar), and multispectral data sensors. A customer asking which dataset is right for monitoring crop health is not the same as a customer asking how to reset their password. The support team needed real product fluency to be useful.",
        "Third, the strategic stakes. As SkyFi's leaders, Claire and Mike, kept emphasizing in their early conversations with xFusion, customer support at SkyFi is not a cost center to be minimized. It is part of how the company keeps customers at the center of everything they do. A weak support function would not just frustrate users. It would undermine the brand promise. The challenge was not just to manage the growing volume. It was to deliver support that was technically adept, globally available, and aligned with SkyFi's approach to the Earth observation industry.",
      ];

      const solutionParagraphs = [
        "xFusion built a dedicated team for SkyFi and trained them on SkyFi's product, processes, and tone.",
        "The team learned the technical layer first. Optical, SAR, multispectral. The differences between datasets. The use cases customers cared about across agriculture, real estate, and mining. xFusion's account managers worked alongside SkyFi to build out internal documentation and training materials so the team could handle complex queries instead of escalating every nuanced question back to the SkyFi staff.",
        "The team integrated into SkyFi's internal systems. That sounds small, but it matters. When a support agent has to ping someone on the SkyFi team for every account lookup, the response loop breaks. Direct system access meant real-time issue resolution, not handoffs.",
        'The team operated around the clock. Coverage extended across time zones to match the global customer base. Customers in Asia, Europe, the Americas, and beyond got fast responses regardless of when they reached out.',
        "The team did more than answer tickets. xFusion's agents were trained to spot opportunities, not just resolve issues. When a customer's question hinted at a deeper need, or signaled a potential expansion, the team flagged it back to SkyFi so the right person could follow up. Customer support became a quiet feeder to growth instead of a one-way ticket sink. xFusion's account managers stayed in the loop the entire time. Performance reviews, ongoing training, alignment on new product launches, escalation paths. SkyFi did not have to manage the team. xFusion did.",
      ];

      const resultsParagraphs = [
        'The partnership delivered three measurable outcomes and one cultural one.',
        '91.9% customer satisfaction. Sustained across a global, technical customer base. Not a launch-week number. An ongoing average.',
        '36-minute average response time. Across all time zones, in a 24/7 environment. Customers who reached out in the middle of the night got real answers in well under an hour.',
        "Round-the-clock global coverage. SkyFi's customers in 185 countries got the same support quality regardless of where the sun was. The coverage gap that constrains most growing SaaS support teams stopped constraining SkyFi.",
        "Time and focus returned to the core team. SkyFi's internal staff stopped being the back-up CS team. Engineering and product leaders went back to building. Claire and Mike went back to leading. The cultural outcome was that SkyFi could keep customers at the center of everything they do without burning out the people running the company.",
        'In Claire\u2019s words, the xFusion team "never leave a customer interaction unresolved." For a product company moving fast in a competitive industry, that is the support function you want.',
      ];

      return (
        <div>
          <Nav current="case-studies" />

          {/* 1. Hero */}
          <PageHeader
            eyebrow="CASE STUDY · 10"
            title="SkyFi"
            subhead="How SkyFi delivers technically deep, 24/7 customer support across 185 countries with xFusion."
            portraitName="Claire Fundingsland"
            portraitLabel="CLAIRE FUNDINGSLAND"
            portraitSrc="../../images/claire-fundingsland-skyfi.png"
          />

          {/* 2. Overview */}
          <OverviewBox rows={overviewRows} />

          {/* 3. About */}
          <LongForm
            number="01"
            section="About the company"
            title="About SkyFi"
            paragraphs={aboutParagraphs}
            dropCap={true}
            bg="paper"
          />

          {/* 4. Lead testimonial */}
          <TestimonialFeature
            pullQuote="They never leave a customer interaction unresolved."
            fullQuote="xFusion's emphasis on customer satisfaction has been such an asset to SkyFi. I am so impressed with our xFusion team's thoroughness and their ability to adapt and learn quickly. Their internal processes and collaboration foster alignment and ongoing training, and they're always eager to learn and do more. They never leave a customer interaction unresolved and are always quick to alert us for potential opportunities with customers, which has helped our team grow at scale and keep customers at the center of everything we do."
            name="Claire Fundingsland"
            role="Head of Customer Experience"
            company="SkyFi"
            portraitLabel="CLAIRE FUNDINGSLAND"
            portraitSrc="../../images/claire-fundingsland-skyfi.png"
          />

          {/* 5. Key metric */}
          <MetricCallout
            headline={<span>91.9% CSAT.<br/>36-minute average response time.</span>}
            support="Across a global, 24/7 customer base spanning 185 countries."
            variant="forest"
          />

          {/* 6. The Challenge */}
          <LongForm
            number="02"
            section="The challenge"
            title="The challenge"
            paragraphs={challengeParagraphs}
            bg="paper"
          />

          {/* 7. The Solution */}
          <LongForm
            number="03"
            section="The solution"
            title="The solution"
            paragraphs={solutionParagraphs}
            bg="paper-2"
          />

          {/* 8. Leader shoutouts */}
          <ShoutoutGrid
            section="Section 08"
            title="Shoutouts from SkyFi leaders"
            caption="Quotes coming soon. The lead testimonial from Claire Fundingsland appears above; a second leader, Mike, is referenced in the source material with full attribution to be added in the final build pass."
            emptyLabel="Final quotes pending sourcing"
            cols={3}
            bg="paper"
            items={[
              { label: 'Leader', org: 'SkyFi' },
              { label: 'Leader', org: 'SkyFi' },
              { label: 'Leader', org: 'SkyFi' },
            ]}
          />

          {/* 9. Customer shoutouts */}
          <ShoutoutGrid
            section="Section 09"
            title="Shoutouts from SkyFi customers"
            caption="Quotes coming soon. End-customer kudos referenced in the source material as screenshots will be transcribed and added during the final build pass."
            emptyLabel="Final quotes pending transcription"
            cols={3}
            bg="paper-2"
            items={[
              { label: 'Customer', org: 'SkyFi customer' },
              { label: 'Customer', org: 'SkyFi customer' },
              { label: 'Customer', org: 'SkyFi customer' },
            ]}
          />

          {/* 10. The Results */}
          <LongForm
            number="04"
            section="The results"
            title="The results"
            paragraphs={resultsParagraphs}
            bg="paper"
          />

          {/* 11. Final CTA */}
          <CTASection
            title="Want to see if we can help you too?"
            body="If your customer support is buckling under global volume, technical depth, or 24/7 coverage demands, we can help. We will recruit, vet, place, train, and manage a senior, AI-augmented CS agent for your business. You will work with them for 30 days before paying anything. If you are not happy, you walk away free."
            ctaLabel="Book a Discovery Call"
            microcopy={"30 minutes. No commitment. No credit card. You'll talk directly with our founding team."}
          />

          <Footer />
        </div>
      );
    }
    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
